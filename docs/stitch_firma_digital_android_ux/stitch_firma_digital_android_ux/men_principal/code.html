<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ACJSignature - Menú Principal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#d6e5eb",
                    "primary-fixed": "#b7eaff",
                    "surface-container-low": "#f0f4f5",
                    "secondary-fixed-dim": "#bac9cf",
                    "on-error": "#ffffff",
                    "primary-container": "#005c72",
                    "outline": "#70787d",
                    "on-tertiary-fixed-variant": "#274f29",
                    "primary": "#004354",
                    "tertiary-fixed": "#c0efba",
                    "surface-container-highest": "#dfe3e4",
                    "primary-fixed-dim": "#8dd0e9",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2c3132",
                    "tertiary": "#1d4520",
                    "on-tertiary-fixed": "#002105",
                    "on-tertiary": "#ffffff",
                    "surface": "#f6fafb",
                    "tertiary-container": "#345d35",
                    "on-surface": "#181c1d",
                    "surface-dim": "#d6dbdc",
                    "on-secondary-container": "#59676c",
                    "tertiary-fixed-dim": "#a4d2a0",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed": "#001f28",
                    "surface-variant": "#dfe3e4",
                    "surface-tint": "#18667d",
                    "outline-variant": "#bfc8cc",
                    "background": "#f6fafb",
                    "surface-container": "#eaeef0",
                    "on-secondary-fixed-variant": "#3b494e",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#d6e5eb",
                    "on-surface-variant": "#3f484c",
                    "on-primary-container": "#8fd2ec",
                    "on-background": "#181c1d",
                    "on-secondary-fixed": "#101d22",
                    "surface-bright": "#f6fafb",
                    "surface-container-high": "#e5e9ea",
                    "on-primary-fixed-variant": "#004e61",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#a6d4a2",
                    "on-error-container": "#93000a",
                    "secondary": "#536166",
                    "inverse-primary": "#8dd0e9",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#edf1f2"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        background: rgba(246, 250, 251, 0.85);
      }
      .card-shadow {
        box-shadow: 0 8px 24px rgba(24, 28, 29, 0.06);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-[#f6fafb] dark:bg-slate-950 flex items-center justify-between px-4 h-16 w-full sticky top-0 z-50">
<div class="flex items-center gap-3">
<button class="hover:bg-[#f0f4f5]/50 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#004354] dark:text-teal-400" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-[#004354] dark:text-teal-400 tracking-tight text-lg">ACJSignature</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-500" data-icon="notifications">notifications</span>
</div>
</header>
<main class="max-w-md mx-auto px-6 pt-8">
<!-- Hero Section -->
<header class="mb-10">
<h2 class="font-headline text-[2.75rem] font-bold text-on-surface leading-tight tracking-tight">Menú Principal</h2>
<p class="font-body text-body-md text-on-surface-variant mt-2">Bienvenido de nuevo. Selecciona una acción para continuar con tu gestión digital.</p>
</header>
<!-- Bento Grid Cards -->
<div class="grid grid-cols-1 gap-6">
<!-- Card 1: Firmar Documento (Azul/Primary) -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 flex flex-col items-start text-left card-shadow hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
<div class="w-14 h-14 rounded-xl bg-primary-container/10 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="edit_square">edit_square</span>
</div>
<h3 class="font-headline text-headline-sm text-primary mb-2">Firmar Documento</h3>
<p class="font-body text-body-md text-on-surface-variant">Inicia el proceso de firma digital segura para tus archivos PDF o DOCX.</p>
<div class="mt-6 flex items-center text-primary font-semibold text-sm">
                    COMENZAR AHORA
                    <span class="material-symbols-outlined text-sm ml-1" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Decorative Accent -->
<div class="absolute top-0 right-0 w-24 h-24 bg-primary/5 rounded-bl-full -mr-8 -mt-8"></div>
</button>
<!-- Card 2: Certificados (Verde/Tertiary) -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 flex flex-col items-start text-left card-shadow hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
<div class="w-14 h-14 rounded-xl bg-tertiary/10 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-tertiary text-3xl" data-icon="verified_user">verified_user</span>
</div>
<h3 class="font-headline text-headline-sm text-tertiary mb-2">Certificados</h3>
<p class="font-body text-body-md text-on-surface-variant">Gestiona tus certificados digitales y llaves de encriptación personalizadas.</p>
<div class="mt-6 flex items-center text-tertiary font-semibold text-sm">
                    VER MIS LLAVES
                    <span class="material-symbols-outlined text-sm ml-1" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Decorative Accent -->
<div class="absolute top-0 right-0 w-24 h-24 bg-tertiary/5 rounded-bl-full -mr-8 -mt-8"></div>
</button>
<!-- Card 3: Documentos Firmados (Naranja/Warning-ish) -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 flex flex-col items-start text-left card-shadow hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
<div class="w-14 h-14 rounded-xl bg-orange-100 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-orange-700 text-3xl" data-icon="history_edu">history_edu</span>
</div>
<h3 class="font-headline text-headline-sm text-orange-800 mb-2">Documentos Firmados</h3>
<p class="font-body text-body-md text-on-surface-variant">Accede al historial completo de documentos procesados y validados.</p>
<div class="mt-6 flex items-center text-orange-700 font-semibold text-sm">
                    EXPLORAR ARCHIVO
                    <span class="material-symbols-outlined text-sm ml-1" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Decorative Accent -->
<div class="absolute top-0 right-0 w-24 h-24 bg-orange-50 rounded-bl-full -mr-8 -mt-8"></div>
</button>
<!-- Card 4: Configuración (Rosa/Accent) -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 flex flex-col items-start text-left card-shadow hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
<div class="w-14 h-14 rounded-xl bg-rose-100 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-rose-600 text-3xl" data-icon="settings">settings</span>
</div>
<h3 class="font-headline text-headline-sm text-rose-800 mb-2">Configuración</h3>
<p class="font-body text-body-md text-on-surface-variant">Ajusta los parámetros de seguridad, perfil y notificaciones de tu cuenta.</p>
<div class="mt-6 flex items-center text-rose-600 font-semibold text-sm">
                    AJUSTES DE PERFIL
                    <span class="material-symbols-outlined text-sm ml-1" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Decorative Accent -->
<div class="absolute top-0 right-0 w-24 h-24 bg-rose-50 rounded-bl-full -mr-8 -mt-8"></div>
</button>
</div>
<!-- Security Context Badge -->
<div class="mt-12 p-4 bg-surface-container-low rounded-xl flex items-center gap-4">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="shield_lock" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<div>
<p class="font-label text-label-md text-on-surface-variant uppercase tracking-wider">Encriptación Activa</p>
<p class="font-body text-sm text-secondary">Nivel de seguridad de grado legal habilitado.</p>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-2 pb-safe bg-[#f6fafb] dark:bg-slate-950 z-50 shadow-[0_-8px_24px_rgba(24,28,29,0.06)] border-t border-[#dfe3e4] dark:border-slate-800">
<a class="flex flex-col items-center justify-center bg-[#d6e5eb] dark:bg-teal-900/30 text-[#004354] dark:text-teal-200 rounded-xl px-5 py-1 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Inter'] font-medium text-[12px]">Inicio</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1 hover:text-[#005c72] dark:hover:text-teal-300 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-['Inter'] font-medium text-[12px]">Documentos</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1 hover:text-[#005c72] dark:hover:text-teal-300 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] font-medium text-[12px]">Configuración</span>
</a>
</nav>
</body></html>
